# Many entries point at bot-protected sites (x.com, company/lab pages) that 403 to
# automated checkers but load fine in a browser — accept those; exclude dynamic hosts.
accept = [200, 206, 403, 405, 429]
max_retries = 2
retry_wait_time = 2
timeout = 20
user_agent = "Mozilla/5.0 (compatible; longevity-loop-linkcheck)"
exclude = [
  "^https://img\\.shields\\.io",
  "^https://github\\.com/wjlgatech/longevity-loop",
]
